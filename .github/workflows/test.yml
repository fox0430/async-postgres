name: Unit tests

on:
  pull_request:
    paths:
      - '.github/workflows/test.yml'
      - 'docker-compose.yml'
      - 'async_postgres.nim*'
      - 'async_postgres/**'
      - 'tests/**'
      - 'examples/**'
  push:
    paths:
      - '.github/workflows/test.yml'
      - 'docker-compose.yml'
      - 'async_postgres.nim*'
      - 'async_postgres/**'
      - 'tests/**'
      - 'examples/**'
    branches:
      - main

permissions:
  contents: read

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        os:
          - 'ubuntu-latest'
          - 'macOS-latest'
        nim-version:
          - '2.2.4'
          - 'stable'
          - 'devel'

    name: Tests on ${{ matrix.nim-version }} (${{ matrix.os }})
    steps:
      - uses: actions/checkout@v6

      - name: Cache nimble
        id: cache-nimble
        uses: actions/cache@v5
        with:
          path: ~/.nimble
          key: ${{ runner.os }}-nimble-v2-${{ hashFiles('*.nimble') }}
          restore-keys: |
            ${{ runner.os }}-nimble-v2-

      - name: Setup Nim (stable/release)
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ matrix.nim-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
        if: matrix.nim-version != 'devel'

      - name: Setup Nim (devel)
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ matrix.nim-version }}
          use-nightlies: true
          repo-token: ${{ secrets.GITHUB_TOKEN }}
        if: matrix.nim-version == 'devel'

      - name: Generate test certificates
        run: bash tests/gen_certs.sh

      # macOS runners have no Docker, so PostgreSQL is only available on Linux.
      - name: Start PostgreSQL
        id: start-psql
        if: runner.os == 'Linux'
        run: docker compose up -d --wait
        background: true

      - name: Install chronos
        id: install-chronos
        run: nimble install chronos -y
        background: true

      - name: Wait setup
        wait: [start-psql, install-chronos]

      - name: Install async_postgres
        run: |
          rm -rf ~/.nimble/pkgs2/async_postgres-*
          nimble install -y

      # Linux runs the full suite against the live PostgreSQL above.
      - name: Run tests
        id: run-tests
        if: runner.os == 'Linux'
        run: nimble test -y
        background: true

      # macOS has no PostgreSQL; run only the unit and mock-server tests.
      - name: Run unit tests
        id: run-unit-tests
        if: runner.os != 'Linux'
        run: nimble test_unit -y
        background: true

      - name: Compile examples (asyncdispatch)
        run: for f in examples/*.nim; do nim c "$f"; done

      - name: Compile examples (chronos)
        run: for f in examples/*.nim; do nim c -d:asyncBackend=chronos "$f"; done

      # Doc generation is platform-independent; run it once (on Linux).
      - name: Gen docs
        if: runner.os == 'Linux'
        run: |
          nim doc --project --index:on --outdir:./htmldocs ./async_postgres.nim

      - name: Wait tests
        wait: [run-tests, run-unit-tests]
