name: Unit tests

on:
  pull_request:
    paths:
      - '.github/workflows/test.yml'
      - 'docker-compose.yml'
      - 'async_postgres.nim*'
      - 'async_postgres/**'
      - 'tests/**'
      - 'examples/**'
  push:
    paths:
      - '.github/workflows/test.yml'
      - 'docker-compose.yml'
      - 'async_postgres.nim*'
      - 'async_postgres/**'
      - 'tests/**'
      - 'examples/**'
    branches:
      - main

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        nim-version:
          - '2.2.4'
          - 'stable'
          - 'devel'

    name: Tests on ${{ matrix.nim-version }}
    steps:
      - uses: actions/checkout@v6

      - name: Cache nimble
        id: cache-nimble
        uses: actions/cache@v5
        with:
          path: ~/.nimble
          key: ${{ runner.os }}-nimble-v2-${{ hashFiles('*.nimble') }}
          restore-keys: |
            ${{ runner.os }}-nimble-v2-

      - name: Setup Nim (stable/release)
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ matrix.nim-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
        if: matrix.nim-version != 'devel'

      - name: Setup Nim (devel)
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ matrix.nim-version }}
          use-nightlies: true
          repo-token: ${{ secrets.GITHUB_TOKEN }}
        if: matrix.nim-version == 'devel'

      - name: Generate test certificates
        run: bash tests/gen_certs.sh

      - name: Start PostgreSQL
        run: docker compose up -d --wait

      - name: Install chronos
        run: nimble install chronos -y

      - name: Run tests
        run: nimble test -y

      - name: Install async_postgres
        run: |
          rm -rf ~/.nimble/pkgs2/async_postgres-*
          nimble install -y

      - name: Compile examples (asyncdispatch)
        run: for f in examples/*.nim; do nim c "$f"; done

      - name: Compile examples (chronos)
        run: for f in examples/*.nim; do nim c -d:asyncBackend=chronos "$f"; done

      - name: Gen docs
        run: |
          nim doc --project --index:on --outdir:./htmldocs ./async_postgres.nim
